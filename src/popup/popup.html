<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NotebookLM Clipper</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       STATE : auth-required
       Affiché en premier lancement ou session expirée.
  ════════════════════════════════════════════════════ -->
  <section id="state-auth-required" class="state" aria-live="polite">
    <div class="brand">
      <img src="/icons/icon.svg" alt="NotebookLM Clipper" class="brand-icon" />
      <span class="brand-name">NotebookLM Clipper</span>
    </div>
    <h1 class="state-heading" data-i18n="stateAuthRequired"></h1>
    <p class="state-body" data-i18n="stateAuthRequiredBody"></p>
    <button id="btn-connect" class="btn btn-primary" data-i18n="btnConnect"></button>
  </section>

  <!-- ═══════════════════════════════════════════════════
       STATE : loading
       Affiché pendant les requêtes async.
  ════════════════════════════════════════════════════ -->
  <section id="state-loading" class="state hidden" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <p class="state-body" data-i18n="stateLoading"></p>
  </section>

  <!-- ═══════════════════════════════════════════════════
       STATE : ready
       Affichage des métadonnées email + sélecteur carnet + boutons d'import.
  ════════════════════════════════════════════════════ -->
  <section id="state-ready" class="state hidden">

    <!-- Métadonnées email -->
    <div class="email-meta glass">
      <div class="meta-row">
        <span class="meta-label" data-i18n="labelSubject"></span>
        <span id="meta-subject" class="meta-value"></span>
      </div>
      <div class="meta-row">
        <span class="meta-label" data-i18n="labelFrom"></span>
        <span id="meta-from" class="meta-value"></span>
      </div>
      <div class="meta-row">
        <span class="meta-label" data-i18n="labelDate"></span>
        <span id="meta-date" class="meta-value"></span>
      </div>
    </div>

    <!-- Sélecteur de carnet -->
    <div class="section">
      <label class="section-label" data-i18n="labelNotebook"></label>
      <div class="notebook-search-row">
        <input id="notebook-search" type="search"
               data-i18n-placeholder="placeholderSearch"
               class="input-search" autocomplete="off" />
        <button id="btn-create-notebook" class="btn btn-icon" title="" data-i18n-title="btnCreateNotebook">+</button>
      </div>
      <!-- Création de carnet inline — sprint 2 v1.0.5 (spec §5.3.1).
           ⚠️ window.prompt est interdit dans les popups TB (AGENTS.md §10). -->
      <div id="create-notebook-row" class="notebook-search-row hidden">
        <input id="create-notebook-name" type="text" maxlength="100"
               data-i18n-placeholder="createNotebookPlaceholder"
               class="input-search" autocomplete="off" />
        <button id="btn-create-confirm" class="btn btn-icon" title="" data-i18n-title="btnCreateConfirm" disabled>✓</button>
        <button id="btn-create-cancel" class="btn btn-icon" title="" data-i18n-title="btnCreateCancel">✕</button>
      </div>
      <p id="create-notebook-status" class="create-status hidden" aria-live="polite"></p>
      <ul id="notebook-list" class="notebook-list" role="listbox" aria-label="Notebooks"></ul>
    </div>

    <!-- Note d'intention (masquée pour les PJ) -->
    <div id="intent-wrapper" class="section">
      <label class="section-label" data-i18n="intentNoteLabelVisible" for="intent-note"></label>
      <textarea id="intent-note" class="input-textarea"
                data-i18n-placeholder="intentNotePlaceholder"
                rows="2"></textarea>
    </div>

    <!-- Boutons d'import email -->
    <div id="import-btns" class="btn-group">
      <button id="btn-pdf" class="btn btn-import" data-i18n="btnPdf" data-format="pdf"></button>
      <button id="btn-md"  class="btn btn-import" data-i18n="btnMd"  data-format="md"></button>
    </div>

    <!-- Section Pièces Jointes (conditionnelle) -->
    <div id="attachments-section" class="section hidden">
      <label class="section-label" data-i18n="labelAttachments"></label>
      <ul id="attachment-list" class="attachment-list"></ul>
      <button id="btn-import-attachments" class="btn btn-primary hidden" disabled>
        <!-- Contenu mis à jour dynamiquement par onAttachmentCheckboxChange() -->
      </button>
    </div>

    <!-- Sélecteur de compte -->
    <div id="account-section" class="section account-row hidden">
      <label class="section-label" data-i18n="labelAccount" for="account-select"></label>
      <select id="account-select" class="input-select"></select>
    </div>

  </section>

  <!-- ═══════════════════════════════════════════════════
       STATE : capturing
       Affiché pendant la génération / l'upload.
  ════════════════════════════════════════════════════ -->
  <section id="state-capturing" class="state hidden" aria-live="polite" aria-busy="true">
    <div class="spinner" aria-hidden="true"></div>
    <p id="capturing-status" class="state-body" data-i18n="statusCapturing"></p>
    <div id="batch-progress" class="batch-progress hidden">
      <div class="progress-bar-track">
        <div id="progress-bar-fill" class="progress-bar-fill"></div>
      </div>
      <p id="batch-progress-label" class="progress-label"></p>
    </div>
  </section>

  <!-- ═══════════════════════════════════════════════════
       STATE : success
       Import terminé avec succès.
  ════════════════════════════════════════════════════ -->
  <section id="state-success" class="state hidden" aria-live="polite">
    <div class="success-circle" aria-hidden="true">
      <div class="success-icon">✓</div>
    </div>
    <p class="state-body" data-i18n="statusSuccess"></p>
    <div id="warnings-container" class="warnings hidden"></div>
    <div class="action-row">
      <a id="btn-open-notebook" class="btn btn-primary" target="_blank" rel="noopener noreferrer"
         data-i18n="btnOpenNotebook"></a>
      <button id="btn-download" class="btn btn-secondary hidden" data-i18n="btnDownload"></button>
    </div>
    <button id="btn-new-import" class="btn btn-ghost" data-i18n="btnNewImport"></button>
  </section>

  <!-- ═══════════════════════════════════════════════════
       STATE : error
       Affiché en cas d'erreur.
  ════════════════════════════════════════════════════ -->
  <section id="state-error" class="state hidden" aria-live="assertive">
    <div class="error-circle" aria-hidden="true">
      <div class="error-icon">✕</div>
    </div>
    <p id="error-message" class="state-body error-text"></p>
    <button id="btn-reconnect" class="btn btn-primary hidden" data-i18n="btnReconnect"></button>
    <button id="btn-back" class="btn btn-secondary" data-i18n="btnBack"></button>
  </section>

  <script src="/src/popup/pre_loader.js"></script>
  <script src="/src/shared/utils.js"></script>
  <script src="/src/popup/popup.js"></script>
</body>
</html>
